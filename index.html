<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mochila Digital</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #eef2f7;
    }

    /* MENU LATERAL */
    .sidebar {
      width: 250px;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      background: #34495e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #4a90e2;
    }

    /* CONTEÚDO */
    .content {
      flex: 1;
      padding: 20px;
    }

    .content h1 {
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80vh;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .topbar button {
      padding: 8px 15px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .topbar button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- MENU LATERAL -->
  <div class="sidebar">
    <h2>📚 Matérias</h2>

    <button onclick="abrirMateria('Matemática')">Matemática</button>
    <button onclick="abrirMateria('Português')">Português</button>
    <button onclick="abrirMateria('História')">História</button>
    <button onclick="abrirMateria('Geografia')">Geografia</button>
    <button onclick="abrirMateria('Biologia')">Biologia</button>
    <button onclick="abrirMateria('Química')">Química</button>
    <button onclick="abrirMateria('Física')">Física</button>

    <h2 style="margin-top:20px;">💻 Informática</h2>

    <button onclick="abrirMateria('HTML')">HTML</button>
    <button onclick="abrirMateria('CSS')">CSS</button>
    <button onclick="abrirMateria('POO Java')">POO Java</button>
    <button onclick="abrirMateria('Lógica')">Lógica</button>
  </div>

  <!-- ÁREA DE CONTEÚDO -->
  <div class="content">

    <div class="topbar">
      <h1 id="titulo">Selecione uma matéria</h1>
      <button onclick="salvar()">💾 Salvar</button>
    </div>

    <textarea id="editor" placeholder="Escreva seus conteúdos aqui..."></textarea>

  </div>

  <script>
    let materiaAtual = "";

    function abrirMateria(nome) {
      materiaAtual = nome;
      document.getElementById("titulo").innerText = nome;

      let conteudo = localStorage.getItem(nome);
      document.getElementById("editor").value = conteudo ? conteudo : "";
    }

    function salvar() {
      if (materiaAtual === "") {
        alert("Selecione uma matéria primeiro!");
        return;
      }

      let texto = document.getElementById("editor").value;
      localStorage.setItem(materiaAtual, texto);
      alert("Conteúdo salvo com sucesso!");
    }
  </script>

</body>
</html>
