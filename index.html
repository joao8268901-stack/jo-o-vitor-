<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mochila Digital PRO</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

    body { display:flex; height:100vh; background:#eef2f7; }

    .sidebar {
      width:260px;
      background:#1e2a38;
      color:white;
      padding:20px;
      display:flex;
      flex-direction:column;
    }

    .sidebar h2 { margin-bottom:10px; font-size:16px; opacity:0.8; }

    .sidebar input {
      padding:8px;
      border:none;
      border-radius:6px;
      margin-bottom:15px;
    }

    .sidebar button {
      padding:10px;
      margin-bottom:8px;
      border:none;
      background:#2c3e50;
      color:white;
      border-radius:8px;
      cursor:pointer;
      transition:0.2s;
    }

    .sidebar button:hover { background:#4a90e2; }

    .content {
      flex:1;
      display:flex;
      flex-direction:column;
      padding:20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .topbar h1 { font-size:22px; }

    .actions button {
      margin-left:10px;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#4a90e2;
      color:white;
    }

    .actions button:hover { opacity:0.8; }

    textarea {
      flex:1;
      padding:15px;
      border-radius:10px;
      border:1px solid #ccc;
      resize:none;
      font-size:14px;
    }

    .dark { background:#121212; color:white; }
    .dark textarea { background:#1e1e1e; color:white; border:1px solid #555; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>🔍 Buscar</h2>
  <input type="text" placeholder="Pesquisar..." onkeyup="filtrar(this.value)">

  <h2>📚 Matérias</h2>
  <div id="listaMaterias"></div>
</div>

<div class="content" id="conteudo">

  <div class="topbar">
    <h1 id="titulo">Selecione uma matéria</h1>
    <div class="actions">
      <button onclick="novo()">➕ Novo</button>
      <button onclick="salvar()">💾 Salvar</button>
      <button onclick="exportar()">📄 Exportar</button>
      <button onclick="modoEscuro()">🌙</button>
    </div>
  </div>

  <textarea id="editor" placeholder="Escreva seus conteúdos..."></textarea>

</div>

<script>
  let materias = [
    "Matemática","Português","História","Geografia","Biologia","Química","Física",
    "HTML","CSS","POO Java","Lógica"
  ];

  let materiaAtual = "";

  function carregarLista() {
    let lista = document.getElementById("listaMaterias");
    lista.innerHTML = "";

    materias.forEach(m => {
      let btn = document.createElement("button");
      btn.innerText = m;
      btn.onclick = () => abrirMateria(m);
      lista.appendChild(btn);
    });
  }

  function abrirMateria(nome) {
    materiaAtual = nome;
    document.getElementById("titulo").innerText = nome;

    let conteudo = localStorage.getItem(nome);
    document.getElementById("editor").value = conteudo || "";
  }

  function salvar() {
    if (!materiaAtual) return alert("Escolha uma matéria!");
    localStorage.setItem(materiaAtual, document.getElementById("editor").value);
    alert("Salvo!");
  }

  function novo() {
    let nome = prompt("Nome da nova matéria:");
    if (nome) {
      materias.push(nome);
      carregarLista();
    }
  }

  function exportar() {
    let texto = document.getElementById("editor").value;
    let blob = new Blob([texto], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = materiaAtual + ".txt";
    a.click();
  }

  function filtrar(valor) {
    let botoes = document.querySelectorAll(".sidebar button");
    botoes.forEach(btn => {
      btn.style.display = btn.innerText.toLowerCase().includes(valor.toLowerCase()) ? "block" : "none";
    });
  }

  function modoEscuro() {
    document.body.classList.toggle("dark");
  }

  carregarLista();
</script>

</body>
  </body>
  <a href="aula.html"> <button class="btn"> S.O.MIGUEL <button/> </a>
</html>
