<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Arcade</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#000;
  padding:20px;
  box-shadow:0 0 20px #00f7ff;
}

.sidebar h2 { margin-bottom:10px; }

.sidebar input {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  margin-bottom:10px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#0ff;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover {
  background:#0ff;
  color:#000;
  transform:scale(1.05);
  box-shadow:0 0 10px #0ff;
}

/* CONTEÚDO */
.content {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
}

.topbar {
  display:flex;
  justify-content:space-between;
}

.actions button {
  background:#ff0055;
  color:white;
  border:none;
  padding:8px 12px;
  margin-left:10px;
  border-radius:8px;
  cursor:pointer;
}

.actions button:hover {
  transform:scale(1.1);
  box-shadow:0 0 10px #ff0055;
}

/* EDITOR */
textarea {
  flex:1;
  margin-top:10px;
  border-radius:10px;
  padding:15px;
  background:#111;
  color:#0f0;
  border:1px solid #0ff;
}

/* TELA FIGHT */
#fightScreen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  color:#ff0000;
  z-index:999;
  animation:sumir 2s forwards;
}

@keyframes sumir {
  0% {opacity:1;}
  100% {opacity:0; visibility:hidden;}
}
</style>
</head>

<body>

<div id="fightScreen">FIGHT!</div>

<div class="sidebar">
  <h2>🔍 Buscar</h2>
  <input type="text" onkeyup="filtrar(this.value)">

  <h2>📚 Matérias</h2>
  <div id="listaMaterias"></div>
</div>

<div class="content">

  <div class="topbar">
    <h1 id="titulo">Escolha sua batalha</h1>
    <div class="actions">
      <button onclick="novo()">➕</button>
      <button onclick="salvar()">💾</button>
      <button onclick="exportar()">📄</button>
    </div>
  </div>

  <textarea id="editor"></textarea>

</div>

<!-- 🔊 SONS -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="selectSound" src="select.mp3"></audio>
<audio id="saveSound" src="save.mp3"></audio>
<audio id="bgMusic" src="music.mp3" loop></audio>

<script>
let materias = ["Matemática","Português","História","HTML","CSS"];
let materiaAtual = "";

// tocar som
function playSound(id){
  let s = document.getElementById(id);
  if(s){
    s.currentTime = 0;
    s.play().catch(()=>{});
  }
}

// desbloquear áudio + música
document.body.addEventListener("click", ()=>{
  document.getElementById("bgMusic").play().catch(()=>{});
}, {once:true});

// clique geral
document.addEventListener("click", e=>{
  if(e.target.tagName==="BUTTON"){
    playSound("clickSound");
  }
});

function carregarLista(){
  let lista = document.getElementById("listaMaterias");
  lista.innerHTML="";
  materias.forEach(m=>{
    let b = document.createElement("button");
    b.innerText=m;
    b.onclick=()=>abrirMateria(m);
    lista.appendChild(b);
  });
}

function abrirMateria(nome){
  playSound("selectSound");

  materiaAtual=nome;
  document.getElementById("titulo").innerText=nome;

  let c = localStorage.getItem(nome);
  document.getElementById("editor").value = c || "";
}

function salvar(){
  if(!materiaAtual) return alert("Escolha uma matéria!");
  localStorage.setItem(materiaAtual, editor.value);

  playSound("saveSound");
  alert("SALVO ✔");
}

function novo(){
  let n = prompt("Nova matéria:");
  if(n){
    materias.push(n);
    carregarLista();
  }
}

function exportar(){
  let blob = new Blob([editor.value]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = materiaAtual + ".txt";
  a.click();
}

function filtrar(v){
  document.querySelectorAll(".sidebar button").forEach(b=>{
    b.style.display = b.innerText.toLowerCase().includes(v.toLowerCase()) ? "block":"none";
  });
}

carregarLista();
</script>

</body>
</html>
